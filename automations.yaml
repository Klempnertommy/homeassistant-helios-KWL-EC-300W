# AUTOMATION 1: Der direkte Klick auf die Lüfterstufe im Dashboard
- id: kwl_direkt_stufe
  alias: "KWL: Direkt-Klick Lüfterstufe"
  trigger:
    - platform: state
      entity_id: input_select.kwl_luefterstufe_auswahl
  condition:
    - condition: state
      entity_id: input_select.kwl_globaler_modus
      state: "HA übernimmt die Macht (Hand)"
  action:
    - choose:
        - conditions:
            - condition: state
              entity_id: input_select.kwl_luefterstufe_auswahl
              state: "Stufe 1 (Minimal)"
          sequence:
            - action: shell_command.kwl_luefterstufe_schalten
              data:
                stufe: 1
        - conditions:
            - condition: state
              entity_id: input_select.kwl_luefterstufe_auswahl
              state: "Stufe 2 (Normal)"
          sequence:
            - action: shell_command.kwl_luefterstufe_schalten
              data:
                stufe: 2
        - conditions:
            - condition: state
              entity_id: input_select.kwl_luefterstufe_auswahl
              state: "Stufe 3 (Erhöht)"
          sequence:
            - action: shell_command.kwl_luefterstufe_schalten
              data:
                stufe: 3
        - conditions:
            - condition: state
              entity_id: input_select.kwl_luefterstufe_auswahl
              state: "Stufe 4 (Stoßlüftung)"
          sequence:
            - action: shell_command.kwl_luefterstufe_schalten
              data:
                stufe: 4

# AUTOMATION 2: Die Master-Weiche (Schaltet bei Handbetrieb sofort die Stufe durch)
- id: kwl_direkt_macht_weiche
  alias: "KWL: Direkt-Klick Globale Kontrolle"
  trigger:
    - platform: state
      entity_id: input_select.kwl_globaler_modus
  action:
    - choose:
        # FALL 1: Zurück auf Auto -> Übergibt die Kontrolle komplett an das Gerät
        - conditions:
            - condition: state
              entity_id: input_select.kwl_globaler_modus
              state: "Gerät entscheidet alles (Auto)"
          sequence:
            - action: shell_command.kwl_lueftung_auto
        
        # FALL 2: HA übernimmt die Macht -> Handmodus an und gewählte Stufe SOFORT aktivieren!
        - conditions:
            - condition: state
              entity_id: input_select.kwl_globaler_modus
              state: "HA übernimmt die Macht (Hand)"
          sequence:
            - action: shell_command.kwl_lueftung_manuell
            - delay: "00:00:02"
            # Drückt exakt die Stufe rein, die gerade aktiv auf dem Dashboard steht
            - choose:
                - conditions:
                    - condition: state
                      entity_id: input_select.kwl_luefterstufe_auswahl
                      state: "Stufe 1 (Minimal)"
                  sequence:
                    - action: shell_command.kwl_luefterstufe_schalten
                      data:
                        stufe: 1
                - conditions:
                    - condition: state
                      entity_id: input_select.kwl_luefterstufe_auswahl
                      state: "Stufe 2 (Normal)"
                  sequence:
                    - action: shell_command.kwl_luefterstufe_schalten
                      data:
                        stufe: 2
                - conditions:
                    - condition: state
                      entity_id: input_select.kwl_luefterstufe_auswahl
                      state: "Stufe 3 (Erhöht)"
                  sequence:
                    - action: shell_command.kwl_luefterstufe_schalten
                      data:
                        stufe: 3
                - conditions:
                    - condition: state
                      entity_id: input_select.kwl_luefterstufe_auswahl
                      state: "Stufe 4 (Stoßlüftung)"
                  sequence:
                    - action: shell_command.kwl_luefterstufe_schalten
                      data:
                        stufe: 4
