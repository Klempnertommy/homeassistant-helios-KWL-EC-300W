- id: kwl_bypass_dreisprung_steuerung
  alias: "KWL: Bypass Master-Steuerung"
  trigger:
    - platform: state
      entity_id: input_select.kwl_bypass_modus
    - platform: time_pattern
      minutes: "/5"
  action:
    - choose:
        # 1. HELIOS-WERKSAUTOMATIK (Soll-Temperatur fest auf 23°C)
        - conditions:
            - condition: state
              entity_id: input_select.kwl_bypass_modus
              state: "Werkseinstellung (Helios-Auto)"
          sequence:
            - action: shell_command.kwl_bypass_auto

        # 2. WINTERBETRIEB (Im Winter wollen wir WÄRME halten -> Klappe muss ZU = 40)
        - conditions:
            - condition: state
              entity_id: input_select.kwl_bypass_modus
              state: "Winterbetrieb (HA-Heizen)"
          sequence:
            - action: shell_command.kwl_bypass_zu

        # 3. ZWANGSSCHALTUNG AUF (Manueller Test -> Klappe auf = 10)
        - conditions:
            - condition: state
              entity_id: input_select.kwl_bypass_modus
              state: "Zwangsschaltung (Bypass AUF)"
          sequence:
            - action: shell_command.kwl_bypass_auf

        # 4. ZWANGSSCHALTUNG ZU (Manueller Test -> Klappe zu = 40)
        - conditions:
            - condition: state
              entity_id: input_select.kwl_bypass_modus
              state: "Zwangsschaltung (Bypass ZU)"
          sequence:
            - action: shell_command.kwl_bypass_zu

        # 5. SOMMERBETRIEB (Hier entscheidet die Temperatur-Logik!)
        - conditions:
            - condition: state
              entity_id: input_select.kwl_bypass_modus
              state: "Sommerbetrieb (HA-Kühlen)"
          sequence:
            - choose:
                # NUR öffnen (10), wenn es draußen wirklich z.b. 1 Grad (innen - 1.0) kälter ist als drinnen!
                - conditions:
                    - condition: template
                      value_template: >-
                        {% set aussen = states('sensor.helios_aussenluft_t1') | float(0) %}
                        {% set innen = states('sensor.helios_abluft_t3') | float(0) %}
                        {{ aussen <= (innen - 1.0) }}
                  sequence:
                    - action: shell_command.kwl_bypass_auf
              # Wenn es draußen ZU HEISS ist: Klappe ZU (40), um die Hitze auszusperren!
              default:
                - action: shell_command.kwl_bypass_zu
